lvgl:
  buffer_size: 100%
  byte_order: little_endian
  rotation: 90
  displays: my_display
  touchscreens: my_touchscreen

  # ============================================
  # GLOBAL STYLES (New - Modern Look)
  # ============================================
  style:
    # Modern top bar style
    top_bar:
      bg_color: "0x1E293B"          # Slightly lighter than background
      bg_opa: cover
      shadow_width: 4
      shadow_color: "0x000000"
      shadow_offset_y: 2
      shadow_opa: 30%

    # Refined label styles
    label_primary:
      text_color: "0xF8FAFC"        # Clean bright white
      text_font: clockbar_font

    label_secondary:
      text_color: "0x94A3B8"        # Muted gray for secondary info

  # ============================================
  # TOP STATUS BAR (Temperature + Clock)
  # ============================================
  top_layer:
    styles: top_bar
    pad_all: 8
    height: 42

    widgets:
      # Temperature (Left)
      - label:
          text: "-° / -°"
          id: temperatures
          styles: label_primary
          align: top_left
          x: 12
          y: 6

      # Clock (Center)
      - label:
          text: "--:--"
          id: display_time
          styles: label_primary
          align: top_mid
          x: 0
          y: 6
          text_align: center

  # ============================================
  # MAIN PAGE
  # ============================================
  pages:
    - id: main_page
      layout:
        type: flex
        flex_flow: column_wrap
        pad_row: 12
        pad_column: 12
      width: 100%
      bg_color: "0x0F172A"          # Rich dark slate (modern dark mode)
      bg_opa: cover
      pad_top: 52                   # Space for top bar
      pad_bottom: 12
      pad_left: 12
      pad_right: 12

      widgets:
        # Office Features Scene
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: office_scene_features_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: scene_features_icon
                  text: $ledstrip
              - label:
                  align: bottom_left
                  id: scene_features_label
                  text: "Features"
            on_press:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.office_features_stateful_scene

        # Office Calls Scene
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: office_scene_calls_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: office_scene_calls_icon
                  text: $videocall
              - label:
                  align: bottom_left
                  id: office_scene_calls_label
                  text: "Calls"
            on_press:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.office_calls_stateful_scene

        # Office Evening Scene
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: office_scene_evening_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: office_scene_evening_icon
                  text: $nightlight
              - label:
                  align: bottom_left
                  id: office_scene_evening_label
                  text: "Evening"
            on_press:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.office_evening_stateful_scene

        # Office Dimmed Scene
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: office_scene_dimmed_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: office_scene_dimmed_icon
                  text: $nightlight
              - label:
                  align: bottom_left
                  id: office_scene_dimmed_label
                  text: "Dimmed"
            on_press:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.office_dimmed_stateful_scene

        # Office Blind 100%
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: office_blind_open_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $blinds_open
              - label:
                  align: bottom_left
                  text: "Open"
            on_click:
              - homeassistant.service:
                  service: cover.set_cover_position
                  data:
                    entity_id: cover.office_blind
                    position: "100"

        # Office Blind 66%
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: office_blind_66_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $blinds_open
              - label:
                  align: bottom_left
                  text: "Semi Open"
            on_click:
              - homeassistant.service:
                  service: cover.set_cover_position
                  data:
                    entity_id: cover.office_blind
                    position: "66"

        # Office Blind 33%
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: office_blind_33_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $blinds_open
              - label:
                  align: bottom_left
                  text: "Semi Closed"
            on_click:
              - homeassistant.service:
                  service: cover.set_cover_position
                  data:
                    entity_id: cover.office_blind
                    position: "33"

        # Office Blind 0%
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: office_blind_close_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $blinds_closed
              - label:
                  align: bottom_left
                  text: "Close"
            on_click:
              - homeassistant.service:
                  service: cover.set_cover_position
                  data:
                    entity_id: cover.office_blind
                    position: "0"

        # Storage Lights
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: storage_lights_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: storage_lights_icon
                  text: $package
              - label:
                  align: bottom_left
                  id: storage_lights_label
                  text: "Storage"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.office_storage

        # Network Rack
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: network_rack_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: network_rack_icon
                  text: $network
              - label:
                  align: bottom_left
                  id: network_rack_label
                  text: "Network Rack"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.office_network_rack
